<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Signal Clone — Démo Pédagogique</title>
  <style>
    /* Styles globaux et centrage complet */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Conteneur principal façon application de bureau */
    .app-container {
      background-color: #1e1e1e;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 500px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h1 {
      color: #2c6bed; /* Bleu Signal */
      font-size: 1.5rem;
      text-align: center;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .section {
      background-color: #262626;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #333;
    }

    h3 {
      font-size: 0.95rem;
      color: #a0a0a0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* Formulaires et inputs */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      width: 100%;
      background-color: #333333;
      border: 1px solid #444;
      padding: 12px 16px;
      border-radius: 8px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #2c6bed;
    }

    button {
      width: 100%;
      background-color: #2c6bed;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #1b54c0;
    }

    /* Zone de messages / Journal */
    #log {
      list-style: none;
      height: 250px;
      overflow-y: auto;
      background-color: #141414;
      border-radius: 8px;
      padding: 15px;
      border: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #log li {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.4;
      background-color: #262626;
      max-width: 90%;
      word-wrap: break-word;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h1>Signal Clone</h1>
    
    <!-- 1. Inscription -->
    <div class="section">
      <h3>1. Inscription</h3>
      <div class="input-group">
        <input id="username" placeholder="Votre pseudo" />
        <button id="registerBtn">Générer mes clés et m'inscrire</button>
      </div>
    </div>

    <!-- 2. Envoyer un message -->
    <div class="section">
      <h3>2. Envoyer un message</h3>
      <div class="input-group">
        <input id="target" placeholder="Pseudo du destinataire" />
        <input id="message" placeholder="Votre message" />
        <button id="sendBtn">Envoyer (Chiffré)</button>
      </div>
    </div>

    <!-- 3. Journal -->
    <div class="section">
      <h3>Journal des messages</h3>
      <ul id="log"></ul>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="bundle.js"></script>
</body>
</html>
